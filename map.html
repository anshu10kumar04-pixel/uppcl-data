<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>UPPCL Consumer Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:sans-serif;background:#050A0E;color:#D4E8F0;display:flex;flex-direction:column;height:100vh;}
#map{flex:1;min-height:55vh;}
.topbar{padding:10px 14px;background:#111920;border-bottom:1px solid #1E2D38;display:flex;justify-content:space-between;align-items:flex-start;}
.topbar-left h3{font-size:14px;color:#F5A623;margin-bottom:3px;}
.topbar-left p{font-size:11px;color:#8B949E;line-height:1.5;}
.back-btn{background:transparent;border:1px solid #1E2D38;color:#8B949E;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:11px;white-space:nowrap;margin-left:10px;}
.back-btn:hover{border-color:#F5A623;color:#F5A623;}
.list{overflow-y:auto;max-height:35vh;}
.item{padding:10px 14px;border-bottom:1px solid #1E2D38;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;transition:background .15s;}
.item:hover{background:#0E1C26;}
.item.main{border-left:3px solid #F5A623;background:#111920;}
.item.near{border-left:3px solid #FF4D4D;}
.nm{font-size:12px;font-weight:700;}
.sb{font-size:10px;color:#8B949E;margin-top:2px;}
.rt{text-align:right;flex-shrink:0;margin-left:8px;}
.ot{font-size:12px;font-weight:700;}
.at{font-size:10px;margin-top:2px;}
.badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <h3 id="sel-name">Loading…</h3>
    <p id="sel-detail">Please wait…</p>
  </div>
  <button class="back-btn" onclick="history.back()">← Back</button>
</div>
<div id="map"></div>
<div class="list" id="lst"></div>
<script>
try {
  var hash = decodeURIComponent(window.location.hash.slice(1));
  var payload = JSON.parse(hash);
  var DATA = payload.data;
  var clat = payload.lat;
  var clon = payload.lon;

  var map = L.map('map').setView([clat, clon], 16);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OSM, © CARTO', maxZoom: 19
  }).addTo(map);

  function showDet(d) {
    document.getElementById('sel-name').textContent = d.name + ' (' + d.acct + ')';
    document.getElementById('sel-detail').textContent =
      '📱 ' + d.mobile + ' | ' + d.lmv + ' | ₹' + d.out.toLocaleString() +
      ' | ' + d.sub + ' › ' + d.feed + ' | ' + d.addr.substring(0, 80);
  }

  var lst = document.getElementById('lst');

  DATA.forEach(function(d) {
    var c = d.main ? '#F5A623' : (d.atr === 'PAID' ? '#2ECC71' : d.atr === 'LOCK' ? '#AA80FF' : '#FF4D4D');
    var sz = d.main ? 18 : 13;
    var ico = L.divIcon({
      className: '',
      html: '<div style="width:' + sz + 'px;height:' + sz + 'px;background:' + c +
            ';border:2px solid #fff;border-radius:50%;box-shadow:0 0 8px ' + c + '"></div>',
      iconSize: [sz, sz], iconAnchor: [sz / 2, sz / 2]
    });

    var popup = '<div style="font-family:sans-serif;font-size:12px;min-width:200px">' +
      '<b style="font-size:14px">' + d.name + '</b><br/>' +
      '<span style="color:#888">Acct: ' + d.acct + '</span><br/>' +
      'Mobile: ' + d.mobile + '<br/>' +
      'Outstanding: <b style="color:' + (d.out > 50000 ? '#FF4D4D' : '#F5A623') + '">₹' + d.out.toLocaleString() + '</b><br/>' +
      'ATR: <b>' + d.atr + '</b><br/>' +
      'LMV: ' + d.lmv + '<br/>' +
      d.sub + ' › ' + d.feed + '<br/>' +
      '<small>' + d.addr + '</small>' +
      '</div>';

    var mk = L.marker([d.lat, d.lon], { icon: ico }).addTo(map);
    mk.bindPopup(popup, { maxWidth: 250 });
    mk.on('click', function() { showDet(d); });
    if (d.main) mk.openPopup();

    // List item
    var oc = d.out > 100000 ? '#FF4D4D' : d.out > 10000 ? '#F5A623' : '#2ECC71';
    var ac = d.atr === 'PAID' ? '#2ECC71' : d.atr === 'LOCK' ? '#AA80FF' : '#FF8080';
    var dstr = d.main ? '📍 MAIN' : (d.dist < 1 ? (d.dist * 1000).toFixed(0) + 'm' : d.dist.toFixed(2) + 'km');
    var el = document.createElement('div');
    el.className = 'item ' + (d.main ? 'main' : 'near');
    el.innerHTML =
      '<div style="flex:1;min-width:0">' +
        '<div class="nm">' + d.name + '</div>' +
        '<div class="sb">' + d.acct + ' | ' + d.sub + ' › ' + d.feed + '</div>' +
        '<div class="sb">' + d.addr.substring(0, 60) + '</div>' +
      '</div>' +
      '<div class="rt">' +
        '<div class="ot" style="color:' + oc + '">₹' + d.out.toLocaleString() + '</div>' +
        '<div class="at" style="color:' + ac + '">' + d.atr + '</div>' +
        '<div class="sb">' + dstr + '</div>' +
      '</div>';
    el.onclick = function() { map.setView([d.lat, d.lon], 18); showDet(d); mk.openPopup(); };
    lst.appendChild(el);
  });

  showDet(DATA[0]);

} catch(e) {
  document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#FF4D4D;font-family:sans-serif">' +
    '<h2>Error loading map data</h2><p>' + e.message + '</p>' +
    '<button onclick="history.back()" style="margin-top:16px;padding:10px 20px;background:#F5A623;border:none;border-radius:8px;cursor:pointer;font-weight:700">← Go Back</button>' +
    '</div>';
}
</script>
</body>
</html>
